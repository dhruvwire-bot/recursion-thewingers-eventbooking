# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ticketapp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
jwt.secret=your_super_secret_key_change_this_in_prod_min_32_chars
jwt.expiration=86400000

# Web3j (Sepolia testnet)
web3j.client-address=https://sepolia.infura.io/v3/64efaa4f2e174e8697f3f8f26daab64c
web3j.wallet.private-key=f28235453e38bc936b7280864608a716842da7e30c7c46bef43ceebabb95e81d
web3j.contract.address=0x49259FAee7583126e416AD642B5340713ef33a45

# Async
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10

spring.jackson.serialization.fail-on-empty-beans=false


